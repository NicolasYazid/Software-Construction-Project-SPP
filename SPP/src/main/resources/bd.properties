# Par\u00c3\u00a1metros de conexi\u00c3\u00b3n a la base de datos del sistema SPP.
# Llenar con las credenciales del entorno local antes de ejecutar.
# IMPORTANTE: no subir este archivo con contrase\u00c3\u00b1as reales al repositorio.
bd.url=jdbc:mysql://localhost:3306/spp_db?allowPublicKeyRetrieval=true&useSSL=false
bd.usuario=root
bd.contrasena=root

# Cifrado AES-128-CBC (SEG-04).
# bd.clave_cifrado: exactamente 16 caracteres UTF-8 (128 bits).
# bd.iv_cifrado   : exactamente 16 caracteres UTF-8 (vector inicial).
# IMPORTANTE: cambiar ambos valores antes de despliegue en producci\u00c3\u00b3n.
bd.clave_cifrado=ClavesPrueba2026
bd.iv_cifrado=IVPrueba20262026