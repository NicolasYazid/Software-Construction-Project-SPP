# Parámetros de conexión a la base de datos del sistema SPP.
# Llenar con las credenciales del entorno local antes de ejecutar.
# IMPORTANTE: no subir este archivo con contraseñas reales al repositorio.
bd.url=jdbc:mysql://localhost:3306/spp?useSSL=false&serverTimezone=America/Mexico_City&characterEncoding=UTF-8
bd.usuario=root
bd.contrasena=

# Cifrado AES-128-CBC (SEG-04).
# bd.clave_cifrado: exactamente 16 caracteres UTF-8 (128 bits).
# bd.iv_cifrado   : exactamente 16 caracteres UTF-8 (vector inicial).
# IMPORTANTE: cambiar ambos valores antes de despliegue en producción.
bd.clave_cifrado=ClavesPrueba2026
bd.iv_cifrado=IVPrueba20262026
